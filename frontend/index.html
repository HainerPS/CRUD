<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App de Tarefas</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main>
    <h1>Lista de Tarefas</h1>

    <section aria-label="Adicionar nova tarefa">
      <input
        id="task-input"
        type="text"
        placeholder="Digite uma tarefa"
      />
      <button id="add-task-btn" type="button">Adicionar</button>
    </section>

    <section aria-label="Tarefas cadastradas">
      <ul id="task-list"></ul>
    </section>
  </main>
  <script src="./js/script.js"></script>
</body>
</html>
